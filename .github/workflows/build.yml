name: Build Windows EXE
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install numpy pyinstaller
      - run: pyinstaller --onefile --windowed --name MSTS_to_OBJ_Converter app.py
      - uses: actions/upload-artifact@v4
        with:
          name: MSTS_to_OBJ_Converter-windows-exe
          path: dist/MSTS_to_OBJ_Converter.exe
